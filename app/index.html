<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Electromagnetic Field Solver</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0c0c10;
  --surface: #16161c;
  --surface-2: #1e1e26;
  --border: #2a2a35;
  --border-hover: #3a3a48;
  --text: #e2e2e8;
  --text-dim: #8888a0;
  --text-muted: #55556a;
  --accent: #6366f1;
  --accent-hover: #818cf8;
  --accent-glow: rgba(99, 102, 241, 0.15);
  --green: #34d399;
  --red: #f87171;
  --orange: #fb923c;
  --radius: 10px;
  --radius-sm: 6px;
  --font: 'Inter', system-ui, -apple-system, sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', 'Menlo', 'Consolas', monospace;
}

html, body { height: 100%; }
body {
  font-family: var(--font);
  font-size: 13px;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

#app {
  display: grid;
  grid-template-columns: 1.3fr 0.75fr 1fr;
  grid-template-rows: auto 1fr;
  gap: 6px;
  height: 100vh;
  padding: 6px;
}

/* ---- Header ---- */
header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 10px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
header h1 {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, #c7d2fe, #6366f1);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
header .subtitle {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 400;
}
header .spacer { flex: 1; }

/* ---- Panels ---- */
.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: border-color 0.2s;
}
.panel:focus-within { border-color: var(--border-hover); }

.panel-header {
  padding: 8px 12px;
  background: var(--surface-2);
  font-weight: 500;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.panel-body {
  flex: 1;
  overflow: auto;
  padding: 0;
}

/* ---- Buttons & Controls ---- */
select, button {
  font-family: var(--font);
  font-size: 11px;
  font-weight: 500;
  padding: 5px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text-dim);
  cursor: pointer;
  transition: all 0.15s;
}
select:hover, button:hover {
  border-color: var(--border-hover);
  color: var(--text);
}
select:focus, button:focus { outline: none; }
select option { background: var(--surface); color: var(--text); }

button.primary {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  box-shadow: 0 0 12px var(--accent-glow);
}
button.primary:hover {
  background: var(--accent-hover);
  border-color: var(--accent-hover);
  box-shadow: 0 0 20px var(--accent-glow);
}
button.primary:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  box-shadow: none;
}
button.danger {
  background: transparent;
  color: var(--red);
  border-color: rgba(248, 113, 113, 0.3);
}
button.danger:hover {
  background: rgba(248, 113, 113, 0.1);
  border-color: var(--red);
}
button.danger:disabled { opacity: 0.3; cursor: not-allowed; }

/* ---- Tab buttons ---- */
.tab-group { display: flex; gap: 2px; }
.tab-btn {
  padding: 4px 12px;
  border: none;
  border-radius: var(--radius-sm);
  background: transparent;
  cursor: pointer;
  font-family: var(--font);
  font-size: 11px;
  font-weight: 500;
  color: var(--text-muted);
  transition: all 0.15s;
}
.tab-btn:hover { color: var(--text-dim); background: rgba(255,255,255,0.04); }
.tab-btn.active {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 0 10px var(--accent-glow);
}

/* ---- Editor ---- */
#script-container, #xml-container {
  width: 100%;
  height: 100%;
  min-height: 300px;
}
#xml-container { display: none; }
#xml-container.visible { display: block; }
#script-container .cm-editor,
#xml-container .cm-editor {
  height: 100%;
  background: transparent;
}
#script-container .cm-scroller,
#xml-container .cm-scroller { overflow: auto; }
#script-container .cm-gutters,
#xml-container .cm-gutters {
  background: var(--surface) !important;
  border-right: 1px solid var(--border) !important;
}
#editor-error {
  display: none;
  padding: 6px 12px;
  background: rgba(248, 113, 113, 0.08);
  color: var(--red);
  font-size: 11px;
  border-top: 1px solid rgba(248, 113, 113, 0.15);
  font-family: var(--mono);
}
#editor-error.visible { display: block; }

/* ---- 3D Viewer ---- */
#viewer-3d {
  width: 100%;
  height: 100%;
  min-height: 300px;
  display: none;
}
#viewer-3d.visible { display: block; }

/* ---- Simulation ---- */
#sim-status {
  padding: 8px 12px;
  font-size: 11px;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 16px;
  font-family: var(--mono);
  font-weight: 400;
}
#sim-status .label { color: var(--text-muted); }
#sim-status .value { color: var(--text); }

#sim-console {
  font-family: var(--mono);
  font-size: 11px;
  line-height: 1.6;
  background: var(--bg);
  color: var(--green);
  padding: 10px 12px;
  flex: 1;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
  min-height: 200px;
}

/* ---- Results ---- */
.result-section {
  padding: 12px;
  border-bottom: 1px solid var(--border);
}
.result-section:last-child { border-bottom: none; }
.result-section h3 {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.plot-container { width: 100%; min-height: 200px; }
.plot-container svg { width: 100%; height: auto; }
.plot-container p { color: var(--text-muted); font-size: 12px; }

/* ---- Loading ---- */
#loading-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(12, 12, 16, 0.85);
  backdrop-filter: blur(8px);
  z-index: 1000;
  justify-content: center;
  align-items: center;
  color: var(--text);
  font-size: 14px;
  font-weight: 500;
}
#loading-overlay.visible { display: flex; }

/* ---- Scrollbars ---- */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-hover); }

/* ---- Responsive ---- */
@media (max-width: 1024px) {
  #app { grid-template-columns: 1fr 1fr; grid-template-rows: auto 1fr 1fr; }
  #panel-results { grid-column: 1 / -1; }
}
@media (max-width: 640px) {
  #app { grid-template-columns: 1fr; grid-template-rows: auto auto auto auto; }
  #panel-results { grid-column: auto; }
}
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="subtitle">Electromagnetic Field Solver</span>
    <div class="spacer"></div>
    <button id="btn-share" title="Copy shareable URL to clipboard">Share</button>
  </header>

  <div class="panel" id="panel-editor">
    <div class="panel-header">
      <div class="tab-group">
        <button class="tab-btn active" data-tab="script">Script</button>
        <button class="tab-btn" data-tab="xml">XML</button>
        <button class="tab-btn" data-tab="3d">3D</button>
      </div>
      <select id="example-select">
        <option value="patch">Patch Antenna</option>
        <option value="msl">MSL Notch Filter</option>
        <option value="helical">Helical Antenna</option>
        <option value="waveguide">Rect Waveguide</option>
      </select>
    </div>
    <div class="panel-body">
      <div id="script-container"></div>
      <div id="xml-container"></div>
      <div id="editor-error"></div>
      <div id="viewer-3d"></div>
    </div>
  </div>

  <div class="panel" id="panel-sim">
    <div class="panel-header">
      Simulation
      <div style="flex:1"></div>
      <button id="btn-run" class="primary">Run</button>
      <button id="btn-stop" class="danger" disabled>Stop</button>
    </div>
    <div class="panel-body" style="display:flex;flex-direction:column;">
      <div id="sim-status">
        <span><span class="label">Status</span> <span class="value" id="status-text">Idle</span></span>
        <span><span class="label">Step</span> <span class="value" id="status-ts">0</span></span>
        <span><span class="label">Elapsed</span> <span class="value" id="status-elapsed">0.0s</span></span>
      </div>
      <div id="sim-console"></div>
    </div>
  </div>

  <div class="panel" id="panel-results">
    <div class="panel-header">Results</div>
    <div class="panel-body">
      <div class="result-section">
        <h3>S-Parameters</h3>
        <div id="plot-sparam" class="plot-container"><p>Run a simulation to see results.</p></div>
      </div>
      <div class="result-section">
        <h3>Impedance</h3>
        <div id="plot-impedance" class="plot-container"><p>Run a simulation to see results.</p></div>
      </div>
      <div class="result-section" id="section-radiation">
        <h3>Radiation</h3>
        <div id="plot-radiation" class="plot-container"><p>NF2FF data required.</p></div>
      </div>
      <div class="result-section" id="section-radiation-3d">
        <h3>3D Radiation Pattern</h3>
        <div id="plot-radiation-3d" style="width:100%;height:350px;position:relative;"></div>
      </div>
      <div class="result-section">
        <h3>Raw Data</h3>
        <pre id="raw-data" style="font-family:var(--mono);font-size:11px;overflow:auto;max-height:200px;color:var(--text-dim);">No data yet.</pre>
      </div>
    </div>
  </div>
</div>

<div id="loading-overlay"><span>Loading WASM module...</span></div>

<script type="module">
import { PATCH_ANTENNA, MSL_NOTCH_FILTER, HELICAL_ANTENNA, RECT_WAVEGUIDE } from '/app/examples.mjs';
import { OpenEMS, ContinuousStructure } from '/app/ems-api.mjs';
import { encodeConfig, decodeConfig, shareConfig, loadSharedConfig } from '/src/url-share.mjs';
import { createViewer } from '/app/geometry-viewer.mjs';
import { createRadiationViewer } from '/app/radiation-viewer.mjs';

const cmState = 'https://esm.sh/@codemirror/state@6.5.2';
const { EditorState } = await import(cmState);
const { EditorView, basicSetup } = await import(`https://esm.sh/codemirror@6.0.1?deps=@codemirror/state@6.5.2`);
const { xml } = await import(`https://esm.sh/@codemirror/lang-xml@6.1.0?deps=@codemirror/state@6.5.2`);
const { javascript } = await import(`https://esm.sh/@codemirror/lang-javascript@6.2.3?deps=@codemirror/state@6.5.2`);
const { oneDark } = await import(`https://esm.sh/@codemirror/theme-one-dark@6.1.2?deps=@codemirror/state@6.5.2`);

const EXAMPLES = {
  patch: PATCH_ANTENNA,
  msl: MSL_NOTCH_FILTER,
  helical: HELICAL_ANTENNA,
  waveguide: RECT_WAVEGUIDE,
};

let viewerDirty = true;
let generatedXml = '';
let scriptExecTimer = null;

const themeOverrides = EditorView.theme({
  '&': { fontSize: '12px', backgroundColor: 'var(--surface)' },
  '.cm-content': { fontFamily: "var(--mono)" },
  '.cm-gutters': { fontSize: '11px', backgroundColor: 'var(--surface)', borderRight: '1px solid var(--border)' },
}, { dark: true });

const cmScript = new EditorView({
  state: EditorState.create({
    doc: EXAMPLES.patch.script,
    extensions: [
      basicSetup,
      javascript(),
      oneDark,
      themeOverrides,
      EditorView.updateListener.of(update => {
        if (update.docChanged) {
          clearTimeout(scriptExecTimer);
          scriptExecTimer = setTimeout(executeScript, 3000);
        }
      }),
    ],
  }),
  parent: document.getElementById('script-container'),
});

const xmlExtensions = [basicSetup, xml(), oneDark, themeOverrides, EditorView.editable.of(false)];
const cmXml = new EditorView({
  state: EditorState.create({ doc: '', extensions: xmlExtensions }),
  parent: document.getElementById('xml-container'),
});

function executeScript() {
  const scriptCode = cmScript.state.doc.toString();
  const editorError = document.getElementById('editor-error');
  try {
    const result = new Function('OpenEMS', 'ContinuousStructure', scriptCode)(OpenEMS, ContinuousStructure);
    if (typeof result === 'string') {
      generatedXml = result;
    } else if (result && typeof result.toXml === 'function') {
      generatedXml = result.toXml();
    } else {
      generatedXml = '';
    }
    cmXml.setState(EditorState.create({ doc: generatedXml, extensions: xmlExtensions }));
    editorError.textContent = '';
    editorError.classList.remove('visible');
    viewerDirty = true;
    updateRadiationVisibility();
    if (activeTab === '3d') {
      viewer3d.update(generatedXml);
      viewerDirty = false;
    }
  } catch (e) {
    console.error('Script execution error:', e);
    editorError.textContent = e.message;
    editorError.classList.add('visible');
  }
}

const exampleSelect = document.getElementById('example-select');
const btnRun = document.getElementById('btn-run');
const btnStop = document.getElementById('btn-stop');
const btnShare = document.getElementById('btn-share');
const statusText = document.getElementById('status-text');
const statusTs = document.getElementById('status-ts');
const statusElapsed = document.getElementById('status-elapsed');
const simConsole = document.getElementById('sim-console');
const loadingOverlay = document.getElementById('loading-overlay');
const rawDataPre = document.getElementById('raw-data');

const editorError = document.getElementById('editor-error');

function updateRadiationVisibility() {
  const has = /<DumpBox\b/i.test(generatedXml);
  document.getElementById('section-radiation').style.display = has ? '' : 'none';
  document.getElementById('section-radiation-3d').style.display = has ? '' : 'none';
}
updateRadiationVisibility();

// ---- 3D Geometry Viewer ----
const viewer3d = createViewer(document.getElementById('viewer-3d'));
let activeTab = 'script';

document.querySelector('.tab-group').addEventListener('click', (e) => {
  const btn = e.target.closest('.tab-btn');
  if (!btn || btn.dataset.tab === activeTab) return;
  activeTab = btn.dataset.tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const scriptEl = document.getElementById('script-container');
  const xmlEl = document.getElementById('xml-container');
  const errorEl = document.getElementById('editor-error');
  const viewerEl = document.getElementById('viewer-3d');

  if (activeTab === 'script') {
    scriptEl.style.display = '';
    xmlEl.classList.remove('visible');
    errorEl.style.display = '';
    viewerEl.classList.remove('visible');
  } else if (activeTab === 'xml') {
    scriptEl.style.display = 'none';
    xmlEl.classList.add('visible');
    errorEl.style.display = 'none';
    viewerEl.classList.remove('visible');
  } else {
    scriptEl.style.display = 'none';
    xmlEl.classList.remove('visible');
    errorEl.style.display = 'none';
    viewerEl.classList.add('visible');
    if (viewerDirty) {
      viewer3d.update(generatedXml);
      viewerDirty = false;
    }
  }
});

function logConsole(msg) {
  simConsole.textContent += msg + '\n';
  simConsole.scrollTop = simConsole.scrollHeight;
}

exampleSelect.addEventListener('change', () => {
  const key = exampleSelect.value;
  if (key && EXAMPLES[key]) {
    const script = EXAMPLES[key].script;
    cmScript.dispatch({
      changes: { from: 0, to: cmScript.state.doc.length, insert: script },
    });
    logConsole(`Loaded example: ${exampleSelect.options[exampleSelect.selectedIndex].text}`);
    executeScript();
  }
});

btnShare.addEventListener('click', async () => {
  const script = cmScript.state.doc.toString().trim();
  if (!script) { logConsole('Nothing to share - editor is empty.'); return; }
  try {
    const fragment = await shareConfig(script);
    const url = `${location.origin}${location.pathname}#${fragment}`;
    await navigator.clipboard.writeText(url);
    logConsole(`Shareable URL copied to clipboard (${url.length} chars).`);
  } catch (e) {
    logConsole(`Share error: ${e.message}`);
  }
});

async function loadFromURL() {
  try {
    const script = await loadSharedConfig();
    if (script) {
      cmScript.dispatch({
        changes: { from: 0, to: cmScript.state.doc.length, insert: script },
      });
      executeScript();
      logConsole('Script loaded from URL.');
    }
  } catch (e) {
    logConsole(`Failed to load config from URL: ${e.message}`);
  }
}

window.addEventListener('hashchange', async () => {
  await loadFromURL();
});

// ---- SVG Plotting ----

function plotSVG(container, { title, xLabel, yLabel, lines, refLines }) {
  const W = 520, H = 320;
  const margin = { top: 30, right: 20, bottom: 40, left: 55 };
  const pw = W - margin.left - margin.right;
  const ph = H - margin.top - margin.bottom;

  let xMin = Infinity, xMax = -Infinity, yMin = Infinity, yMax = -Infinity;
  for (const line of lines) {
    for (let i = 0; i < line.x.length; i++) {
      const xv = line.x[i], yv = line.y[i];
      if (!isFinite(xv) || !isFinite(yv)) continue;
      if (xv < xMin) xMin = xv;
      if (xv > xMax) xMax = xv;
      if (yv < yMin) yMin = yv;
      if (yv > yMax) yMax = yv;
    }
  }

  if (!isFinite(xMin)) { xMin = 0; xMax = 1; }
  if (!isFinite(yMin)) { yMin = 0; yMax = 1; }
  if (xMin === xMax) { xMin -= 0.5; xMax += 0.5; }
  if (yMin === yMax) { yMin -= 0.5; yMax += 0.5; }

  const xPad = (xMax - xMin) * 0.05 || 0.1;
  const yPad = (yMax - yMin) * 0.05 || 0.1;
  xMin -= xPad; xMax += xPad;
  yMin -= yPad; yMax += yPad;

  const sx = (v) => margin.left + ((v - xMin) / (xMax - xMin)) * pw;
  const sy = (v) => margin.top + (1 - (v - yMin) / (yMax - yMin)) * ph;

  function ticks(lo, hi, count) {
    const step = niceStep((hi - lo) / count);
    const start = Math.ceil(lo / step) * step;
    const arr = [];
    for (let v = start; v <= hi + step * 0.01; v += step) arr.push(v);
    return arr;
  }
  function niceStep(rough) {
    const mag = Math.pow(10, Math.floor(Math.log10(rough)));
    const norm = rough / mag;
    if (norm <= 1) return mag;
    if (norm <= 2) return 2 * mag;
    if (norm <= 5) return 5 * mag;
    return 10 * mag;
  }

  function fmtNum(v) {
    if (Math.abs(v) >= 1e6) return (v / 1e6).toFixed(1) + 'M';
    if (Math.abs(v) >= 1e3) return (v / 1e3).toFixed(1) + 'k';
    if (Math.abs(v) < 0.01 && v !== 0) return v.toExponential(1);
    return Number(v.toPrecision(4)).toString();
  }

  const xticks = ticks(xMin, xMax, 6);
  const yticks = ticks(yMin, yMax, 5);

  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" font-family="'Inter',system-ui,sans-serif">`;
  svg += `<rect width="${W}" height="${H}" fill="#16161c" rx="6"/>`;

  svg += `<text x="${W / 2}" y="18" text-anchor="middle" font-size="12" font-weight="600" fill="#e2e2e8">${esc(title)}</text>`;

  svg += `<g stroke="#2a2a35" stroke-width="0.5">`;
  for (const v of xticks) svg += `<line x1="${sx(v)}" y1="${margin.top}" x2="${sx(v)}" y2="${margin.top + ph}"/>`;
  for (const v of yticks) svg += `<line x1="${margin.left}" y1="${sy(v)}" x2="${margin.left + pw}" y2="${sy(v)}"/>`;
  svg += `</g>`;

  svg += `<line x1="${margin.left}" y1="${margin.top + ph}" x2="${margin.left + pw}" y2="${margin.top + ph}" stroke="#3a3a48" stroke-width="1"/>`;
  svg += `<line x1="${margin.left}" y1="${margin.top}" x2="${margin.left}" y2="${margin.top + ph}" stroke="#3a3a48" stroke-width="1"/>`;

  for (const v of xticks) {
    svg += `<text x="${sx(v)}" y="${margin.top + ph + 14}" text-anchor="middle" font-size="10" fill="#8888a0">${fmtNum(v)}</text>`;
  }
  for (const v of yticks) {
    svg += `<text x="${margin.left - 5}" y="${sy(v) + 3}" text-anchor="end" font-size="10" fill="#8888a0">${fmtNum(v)}</text>`;
  }

  svg += `<text x="${W / 2}" y="${H - 4}" text-anchor="middle" font-size="10" fill="#55556a">${esc(xLabel)}</text>`;
  svg += `<text x="12" y="${H / 2}" text-anchor="middle" font-size="10" fill="#55556a" transform="rotate(-90,12,${H / 2})">${esc(yLabel)}</text>`;

  if (refLines) {
    for (const ref of refLines) {
      const y = sy(ref.value);
      if (y >= margin.top && y <= margin.top + ph) {
        svg += `<line x1="${margin.left}" y1="${y}" x2="${margin.left + pw}" y2="${y}" stroke="${ref.color || '#55556a'}" stroke-width="1" stroke-dasharray="4,3"/>`;
        if (ref.label) svg += `<text x="${margin.left + pw - 2}" y="${y - 4}" text-anchor="end" font-size="9" fill="${ref.color || '#55556a'}">${esc(ref.label)}</text>`;
      }
    }
  }

  const colors = ['#818cf8', '#f87171', '#34d399', '#fb923c', '#a78bfa', '#22d3ee'];
  for (let li = 0; li < lines.length; li++) {
    const line = lines[li];
    const color = line.color || colors[li % colors.length];
    let path = '';
    let first = true;
    for (let i = 0; i < line.x.length; i++) {
      if (!isFinite(line.x[i]) || !isFinite(line.y[i])) continue;
      const px = sx(line.x[i]);
      const py = sy(line.y[i]);
      path += first ? `M${px.toFixed(1)},${py.toFixed(1)}` : `L${px.toFixed(1)},${py.toFixed(1)}`;
      first = false;
    }
    svg += `<path d="${path}" fill="none" stroke="${color}" stroke-width="1.5"/>`;
  }

  if (lines.length > 1) {
    const lx = margin.left + 10;
    let ly = margin.top + 14;
    for (let li = 0; li < lines.length; li++) {
      const color = lines[li].color || colors[li % colors.length];
      svg += `<line x1="${lx}" y1="${ly}" x2="${lx + 16}" y2="${ly}" stroke="${color}" stroke-width="2"/>`;
      svg += `<text x="${lx + 20}" y="${ly + 3}" font-size="10" fill="#8888a0">${esc(lines[li].label || `trace ${li + 1}`)}</text>`;
      ly += 14;
    }
  }

  svg += '</svg>';
  container.innerHTML = svg;
}

function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ---- Simulation worker ----

let running = false;
let simStartTime = 0;
let elapsedTimer = null;
const simWorker = new Worker('/app/sim-worker.js');

simWorker.onmessage = (e) => {
  const d = e.data;
  switch (d.type) {
    case 'log':
      logConsole(d.msg);
      break;
    case 'status':
      statusTs.textContent = String(d.step);
      break;
    case 'done': {
      const { nrTS, elapsed, probeData, nf2ffData, fMax } = d;
      statusElapsed.textContent = elapsed + 's';
      statusTs.textContent = String(nrTS);
      statusText.textContent = 'Done';
      logConsole(`Simulation complete. ${nrTS} timesteps in ${elapsed}s.`);
      logConsole('Reading probe data...');

      if (Object.keys(probeData).length > 0) {
        let rawText = '';
        for (const [name, text] of Object.entries(probeData)) {
          rawText += `=== ${name} ===\n`;
          const lines = text.split('\n');
          rawText += lines.slice(0, 20).join('\n');
          if (lines.length > 20) rawText += `\n... (${lines.length} lines total)`;
          rawText += '\n\n';
        }
        rawDataPre.textContent = rawText;
      }

      const parsedProbes = {};
      for (const [name, text] of Object.entries(probeData)) {
        const lines = text.split('\n').filter(l => !l.startsWith('%') && l.trim());
        const time = new Float64Array(lines.length);
        const values = new Float64Array(lines.length);
        for (let i = 0; i < lines.length; i++) {
          const parts = lines[i].trim().split(/\s+/);
          time[i] = parseFloat(parts[0]);
          values[i] = parseFloat(parts[1]);
        }
        parsedProbes[name] = { time, values };
      }
      tryPlotSParams(parsedProbes, fMax);
      tryPlotImpedance(parsedProbes);

      if (nf2ffData) {
        window._lastNF2FFData = nf2ffData;
        tryPlotRadiation();
        tryPlotRadiation3D();
      }

      clearInterval(elapsedTimer);
      running = false;
      btnRun.disabled = false;
      btnStop.disabled = true;
      break;
    }
    case 'error':
      statusText.textContent = 'Error';
      logConsole(`Error: ${d.msg}`);
      clearInterval(elapsedTimer);
      running = false;
      btnRun.disabled = false;
      btnStop.disabled = true;
      break;
  }
};

btnRun.addEventListener('click', () => {
  if (running) return;
  const xml = generatedXml.trim();
  if (!xml) { logConsole('Error: No generated XML. Check your script.'); return; }

  running = true;
  btnRun.disabled = true;
  btnStop.disabled = false;
  statusText.textContent = 'Running';
  statusTs.textContent = '0';
  statusElapsed.textContent = '0.0s';
  simConsole.textContent = '';
  rawDataPre.textContent = 'No data yet.';
  document.getElementById('plot-sparam').innerHTML = '<p>Running...</p>';
  document.getElementById('plot-impedance').innerHTML = '<p>Running...</p>';
  document.getElementById('plot-radiation').innerHTML = '<p>Running...</p>';
  window._lastZdata = null;
  window._lastNF2FFData = null;
  logConsole('Starting simulation...');
  simStartTime = performance.now();
  elapsedTimer = setInterval(() => {
    statusElapsed.textContent = ((performance.now() - simStartTime) / 1000).toFixed(1) + 's';
  }, 100);
  simWorker.postMessage({ type: 'run', xml });
});

btnStop.addEventListener('click', () => {
  simWorker.postMessage({ type: 'stop' });
  logConsole('Stop requested.');
});

function tryPlotSParams(probes, simFMax) {
  const utKeys = Object.keys(probes).filter(k => k.includes('_ut'));
  const itKeys = Object.keys(probes).filter(k => k.includes('_it'));

  if (utKeys.length === 0 || itKeys.length === 0) {
    logConsole('No port probe data found for S-parameter plot.');
    return;
  }

  const ut = probes[utKeys[0]];
  const it = probes[itKeys[0]];
  if (!ut || !it || ut.time.length < 10) return;

  const N = Math.min(ut.time.length, it.time.length);
  const dt = ut.time[1] - ut.time[0];
  const fmax = simFMax > 0 ? simFMax : 0.5 / dt;
  const nf = 201;
  const freq = new Float64Array(nf);
  for (let i = 0; i < nf; i++) freq[i] = (i / (nf - 1)) * fmax;

  function dft(time, values, freqs) {
    const re = new Float64Array(freqs.length);
    const im = new Float64Array(freqs.length);
    for (let k = 0; k < freqs.length; k++) {
      const omega = 2 * Math.PI * freqs[k];
      let sr = 0, si = 0;
      for (let n = 0; n < time.length; n++) {
        const w = n > 0 ? time[n] - time[n - 1] : (time.length > 1 ? time[1] - time[0] : 1);
        sr += values[n] * Math.cos(omega * time[n]) * w;
        si -= values[n] * Math.sin(omega * time[n]) * w;
      }
      re[k] = sr;
      im[k] = si;
    }
    return { re, im };
  }

  const Uf = dft(ut.time, ut.values, freq);
  const If = dft(it.time, it.values, freq);

  const Z0 = 50;
  const s11_dB = new Float64Array(nf);
  const z_re = new Float64Array(nf);
  const z_im = new Float64Array(nf);

  for (let i = 0; i < nf; i++) {
    const denom = If.re[i] * If.re[i] + If.im[i] * If.im[i];
    if (denom < 1e-30) { s11_dB[i] = 0; z_re[i] = 0; z_im[i] = 0; continue; }
    const zr = (Uf.re[i] * If.re[i] + Uf.im[i] * If.im[i]) / denom;
    const zi = (Uf.im[i] * If.re[i] - Uf.re[i] * If.im[i]) / denom;
    z_re[i] = zr;
    z_im[i] = zi;

    const gnr = zr - Z0;
    const gni = zi;
    const gdr = zr + Z0;
    const gdi = zi;
    const gd2 = gdr * gdr + gdi * gdi;
    const gr = (gnr * gdr + gni * gdi) / gd2;
    const gi = (gni * gdr - gnr * gdi) / gd2;
    const mag = Math.sqrt(gr * gr + gi * gi);
    s11_dB[i] = 20 * Math.log10(Math.max(mag, 1e-15));
  }

  const freqGHz = Array.from(freq).map(f => f / 1e9);

  plotSVG(document.getElementById('plot-sparam'), {
    title: 'S11 (Return Loss)',
    xLabel: 'Frequency (GHz)',
    yLabel: 'S11 (dB)',
    lines: [{ x: freqGHz, y: Array.from(s11_dB), label: 'S11', color: '#818cf8' }],
  });

  logConsole('S-parameter plot updated.');
  window._lastZdata = { freqGHz, z_re, z_im };
}

function tryPlotImpedance(probes) {
  setTimeout(() => {
    if (!window._lastZdata) return;
    const { freqGHz, z_re, z_im } = window._lastZdata;
    plotSVG(document.getElementById('plot-impedance'), {
      title: 'Input Impedance',
      xLabel: 'Frequency (GHz)',
      yLabel: 'Z (Ohm)',
      lines: [
        { x: freqGHz, y: Array.from(z_re), label: 'Re(Z)', color: '#818cf8' },
        { x: freqGHz, y: Array.from(z_im), label: 'Im(Z)', color: '#f87171' },
      ],
      refLines: [{ value: 50, label: '50\u2126', color: '#55556a' }],
    });
    logConsole('Impedance plot updated.');
  }, 0);
}

function tryPlotRadiation() {
  if (!window._lastNF2FFData) return;
  const { thetaDeg: theta, xzPattern, yzPattern } = window._lastNF2FFData;
  const container = document.getElementById('plot-radiation');

  const W = 520, H = 320;
  const cx1 = W * 0.25 + 10, cx2 = W * 0.75 - 10, cy = H / 2 + 10;
  const R = Math.min(W / 4 - 20, H / 2 - 30);
  const dbMin = -30, dbMax = 0;
  const dbRange = dbMax - dbMin;

  // Find peak for normalization reference
  let peak = -Infinity;
  for (const v of xzPattern) if (isFinite(v) && v > peak) peak = v;
  for (const v of yzPattern) if (isFinite(v) && v > peak) peak = v;

  function polarPath(thetaDeg, patternDBi, cx_) {
    let path = '';
    for (let i = 0; i < thetaDeg.length; i++) {
      const dB = patternDBi[i] - peak; // normalize to peak
      if (!isFinite(dB)) continue;
      const clamped = Math.max(dbMin, Math.min(dbMax, dB));
      const r = ((clamped - dbMin) / dbRange) * R;
      const angle = (thetaDeg[i] - 90) * Math.PI / 180; // 0° at top
      const x = cx_ + r * Math.cos(angle);
      const y = cy + r * Math.sin(angle);
      path += path ? `L${x.toFixed(1)},${y.toFixed(1)}` : `M${x.toFixed(1)},${y.toFixed(1)}`;
    }
    return path + 'Z';
  }

  function polarGrid(cx_) {
    let g = '';
    const rings = [0, -10, -20, -30];
    for (const db of rings) {
      const r = ((db - dbMin) / dbRange) * R;
      g += `<circle cx="${cx_}" cy="${cy}" r="${r}" fill="none" stroke="#2a2a35" stroke-width="0.5"/>`;
      if (db > dbMin) {
        g += `<text x="${cx_ + 3}" y="${cy - r + 10}" font-size="8" fill="#55556a">${db}</text>`;
      }
    }
    // Angle lines every 45°
    for (let a = 0; a < 360; a += 45) {
      const rad = (a - 90) * Math.PI / 180;
      const x2 = cx_ + R * Math.cos(rad);
      const y2 = cy + R * Math.sin(rad);
      g += `<line x1="${cx_}" y1="${cy}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="#2a2a35" stroke-width="0.5"/>`;
      // Angle labels
      const lx = cx_ + (R + 10) * Math.cos(rad);
      const ly = cy + (R + 10) * Math.sin(rad);
      g += `<text x="${lx.toFixed(1)}" y="${(ly + 3).toFixed(1)}" text-anchor="middle" font-size="8" fill="#55556a">${a}°</text>`;
    }
    return g;
  }

  let svg = `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" font-family="'Inter',system-ui,sans-serif">`;
  svg += `<rect width="${W}" height="${H}" fill="#16161c" rx="6"/>`;
  svg += `<text x="${W / 2}" y="16" text-anchor="middle" font-size="12" font-weight="600" fill="#e2e2e8">Radiation Pattern</text>`;

  // E-plane (xz, phi=0)
  svg += polarGrid(cx1);
  svg += `<path d="${polarPath(theta, xzPattern, cx1)}" fill="rgba(129,140,248,0.1)" stroke="#818cf8" stroke-width="1.5"/>`;
  svg += `<text x="${cx1}" y="${H - 4}" text-anchor="middle" font-size="10" fill="#818cf8">E-plane (φ=0°)</text>`;

  // H-plane (yz, phi=90)
  svg += polarGrid(cx2);
  svg += `<path d="${polarPath(theta, yzPattern, cx2)}" fill="rgba(248,113,113,0.1)" stroke="#f87171" stroke-width="1.5"/>`;
  svg += `<text x="${cx2}" y="${H - 4}" text-anchor="middle" font-size="10" fill="#f87171">H-plane (φ=90°)</text>`;

  // Peak directivity label
  svg += `<text x="${W - 8}" y="16" text-anchor="end" font-size="9" fill="#55556a">Peak: ${peak.toFixed(1)} dBi</text>`;

  svg += '</svg>';
  container.innerHTML = svg;
  logConsole('Radiation pattern updated.');
}

// ---- 3D Radiation Pattern ----
let radiationViewer = null;
function tryPlotRadiation3D() {
  if (!window._lastNF2FFData) return;
  const d = window._lastNF2FFData;
  if (!d.thetaRad || !d.phiRad || !d.directivity_dBi) return;
  if (!radiationViewer) {
    radiationViewer = createRadiationViewer(document.getElementById('plot-radiation-3d'));
  }
  radiationViewer.update({
    thetaRad: d.thetaRad,
    phiRad: d.phiRad,
    directivity_dBi: d.directivity_dBi,
    Dmax_dBi: d.DmaxdBi,
  });
}

executeScript();
loadFromURL();
